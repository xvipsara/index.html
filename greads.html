<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>المشاركة</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#f8fafc,#e2e8f0);-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}.panel{width:100%;max-width:380px;margin:0 auto;padding:12px;box-sizing:border-box}.title{position:sticky;top:0;z-index:10;text-align:center;font-weight:700;font-size:24px;margin-bottom:12px;padding:14px;background:linear-gradient(90deg,#4f46e5,#6366f1);color:#fff;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.12)}.name{display:flex;justify-content:space-between;align-items:center;min-height:58px;padding:12px 14px;margin-bottom:8px;background:#fff;border-radius:14px;cursor:pointer;font-size:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .15s ease,background .15s ease}.name:active{transform:scale(.98);background:#eef2ff}.student{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mark{width:42px;text-align:center;font-weight:700;font-size:28px}.check{color:#16a34a}.star{color:#d97706}.controls{position:sticky;bottom:0;z-index:10;padding-top:8px;background:linear-gradient(to top,#e2e8f0 60%,rgba(226,232,240,0))}.reset-btn{width:100%;border:none;border-radius:14px;padding:14px;font-size:22px;font-weight:700;background:#ef4444;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.12)}.reset-btn:active{transform:scale(.98)}@media (max-width:500px){.panel{max-width:100%;padding:10px}.title{font-size:22px}.name{font-size:22px;min-height:56px}.mark{font-size:26px}}</style></head><body><div class="panel"><div class="title">صف تاسع 4</div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">انتصار بدر</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">براءه مشعل</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">بلقيس فهد</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">حصه سعود</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">حور مشعل</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">ريماس عامر</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">سدن سالم</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">سندس سلطان</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">غلا فيصل</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">فنر محمد</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">لولوة سالم</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">لولوة محمد</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">ليان مبارك</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">ماريه ممدوح</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">مريم طلال</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">نجلاء عبدالله</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">نور محمد</span></div><div class="name" onclick="mark(this)"><span class="mark"></span><span class="student">هاجر عبدالعزيز</span></div><div class="controls"><button class="reset-btn" onclick="resetMarks()">تصفير الكل</button></div></div><script>let audioCtx;function getCtx(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}return audioCtx}function beep(freq,duration=0.18){let ctx=getCtx();let osc=ctx.
createOscillator();let gain=ctx.createGain();osc.type="sine";osc.frequency.value=freq;osc.connect(gain);gain.connect(ctx.destination);gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+duration);osc.start();osc.stop(ctx.currentTime+duration)}function starSound(){beep(900,.12);setTimeout(()=>beep(1200,.16),70)}function mark(el){let span=el.querySelector(".mark");span.classList.remove("check","star");if(span.innerHTML===""){span.innerHTML="✔️";span.classList.add("check");beep(520,.14)}else if(span.innerHTML==="✔️"){span.innerHTML="⭐️";span.classList.add("star");starSound()}else{span.innerHTML=""}}function resetMarks(){document.querySelectorAll(".mark").forEach(span=>{span.innerHTML="";span.classList.remove("check","star")});beep(400,.12)}</script></body></html>
